<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capacitação GRP (MVP)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; color: #212529; }
        .navbar-brand { font-weight: 600; letter-spacing: 0.5px; }
        .card-hover { transition: transform 0.2s, box-shadow 0.2s; border: 1px solid #e9ecef; }
        .card-hover:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .bg-corp { background-color: #0d47a1; }
        .text-corp { color: #0d47a1; }
        .text-purple { color: #6f42c1; }
        .btn-purple { background-color: #6f42c1; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-corp mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-book-half me-2"></i>Ecossistema Digital de Capacitação do GRP (SEF/MG)</a>
            <div class="d-flex">
                <a href="/" class="btn btn-outline-light btn-sm"><i class="bi bi-house me-1"></i>Início</a>
            </div>
        </div>
    </nav>
    <div class="container pb-5">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function fakeLink(event, url) {
            if (url && url !== 'None') {
                window.open(url, '_blank');
            } else {
                event.preventDefault();
                alert("Ação simulada: Vídeo seria aberto aqui.");
            }
        }
        function fakeDownload(event, pdfName) {
            event.preventDefault();
            alert("Ação simulada: O download do arquivo (" + pdfName + ") iniciaria aqui (Localmente não há blob storage conectado).");
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
